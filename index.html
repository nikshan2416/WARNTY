<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iNetwork Solutions - Warranty Tracker</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary-color: #00d4ff;
            --dark-bg: #0f172a;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background-color: var(--dark-bg); 
            color: white;
            display: flex; justify-content: center;
        }
        .container { 
            width: 100%; max-width: 600px; 
            background: #1e293b; padding: 25px; 
            border-radius: 15px; box-shadow: 0 0 20px rgba(0,212,255,0.2);
            margin-top: 20px;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .logo-text { 
            font-size: 32px; font-weight: bold; 
            background: linear-gradient(90deg, #00d4ff, #0055ff);
            background-clip: text;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0,212,255,0.5);
        }
        .sub-text { color: #94a3b8; font-size: 14px; margin-top: 5px; }

        .input-group { background: #334155; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        input, select, button { 
            width: 100%; padding: 12px; margin: 8px 0; 
            border-radius: 8px; border: none; outline: none; font-size: 16px;
        }
        input { background: #f8fafc; color: #1e293b; }
        button { 
            background: linear-gradient(45deg, #00d4ff, #0055ff); 
            color: white; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { opacity: 0.9; transform: scale(1.02); }
        .scan-btn { background: #6366f1; }

        #reader { width: 100%; border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        
        .result-card { 
            background: #0ea5e9; padding: 15px; border-radius: 10px; 
            margin-top: 20px; display: none; border-left: 5px solid #fff;
        }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: var(--primary-color); }
        .status-valid { color: #4ade80; font-weight: bold; }
        .status-expired { color: #f87171; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-text">iNetwork Solutions</div>
        <div class="sub-text">Networking & Security Systems Specialist</div>
    </div>

    <div id="reader"></div>
    <button class="scan-btn" onclick="startScanner()">📷 Scan Camera Serial</button>

    <div class="input-group">
        <input type="text" id="serialNo" placeholder="Serial Number (ஸ்கேன் செய்யவும்)">
        <input type="text" id="modelName" placeholder="Camera Model (e.g. Hikvision 4G)">
        <input type="date" id="installDate" title="Installation Date">
        <select id="warrantyYears">
            <option value="1">1 Year Warranty</option>
            <option value="2" selected>2 Years Warranty</option>
            <option value="3">3 Years Warranty</option>
        </select>
        <button onclick="addEntry()">Add & Save Warranty</button>
    </div>

    <div class="input-group" style="background: #0f172a; border: 1px solid #334155;">
        <input type="text" id="searchSerial" placeholder="Check Warranty (Type or Scan)" oninput="checkWarranty(this.value)">
    </div>

    <div id="resultCard" class="result-card"></div>

    <h3>Inventory List</h3>
    <table>
        <thead>
            <tr>
                <th>Model</th>
                <th>Serial No</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('ins_data')) || [];

    function updateTable() {
        let table = document.getElementById('tableBody');
        table.innerHTML = "";
        db.forEach(item => {
            let row = table.insertRow();
            let status = getWarrantyStatus(item.expiryDate);
            row.innerHTML = `<td>${item.model}</td><td>${item.serial}</td><td class="${status.class}">${status.days} Days Left</td>`;
        });
        localStorage.setItem('ins_data', JSON.stringify(db));
    }

    function addEntry() {
        let serial = document.getElementById('serialNo').value;
        let model = document.getElementById('modelName').value;
        let date = document.getElementById('installDate').value;
        let years = document.getElementById('warrantyYears').value;

        if(!serial || !date) { alert("விபரங்களை பூர்த்தி செய்யவும்!"); return; }

        let expDate = new Date(date);
        expDate.setFullYear(expDate.getFullYear() + parseInt(years));

        db.push({ serial, model, installDate: date, expiryDate: expDate.toISOString() });
        updateTable();
        alert("வெற்றிகரமாக சேமிக்கப்பட்டது!");
    }

    function getWarrantyStatus(expiry) {
        let today = new Date();
        let exp = new Date(expiry);
        let diff = Math.ceil((exp - today) / (1000 * 60 * 60 * 24));
        
        if (diff > 0) return { days: diff, class: 'status-valid' };
        return { days: 0, class: 'status-expired' };
    }

    function checkWarranty(val) {
        let item = db.find(i => i.serial === val);
        let res = document.getElementById('resultCard');
        if(item) {
            let status = getWarrantyStatus(item.expiryDate);
            res.style.display = "block";
            res.innerHTML = `<strong>Model:</strong> ${item.model}<br>
                             <strong>Expiry:</strong> ${new Date(item.expiryDate).toLocaleDateString()}<br>
                             <strong>Status:</strong> ${status.days} Days Remaining`;
        } else {
            res.style.display = "none";
        }
    }

    function onScanSuccess(decodedText) {
        document.getElementById('serialNo').value = decodedText;
        document.getElementById('searchSerial').value = decodedText;
        checkWarranty(decodedText);
        // html5QrcodeScanner.clear(); // To stop after scan
    }

    function startScanner() {
        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    }

    updateTable(); // Load existing data
</script>

</body>
</html>
